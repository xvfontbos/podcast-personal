<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Earbud -->
  <circle cx="30" cy="35" r="16" fill="none" stroke="#4A90D9" stroke-width="5"/>
  <circle cx="30" cy="35" r="7" fill="#4A90D9"/>
  <!-- Cable earbud -->
  <line x1="30" y1="51" x2="30" y2="65" stroke="#4A90D9" stroke-width="4" stroke-linecap="round"/>
  <path d="M30,65 Q30,80 50,80" fill="none" stroke="#4A90D9" stroke-width="4" stroke-linecap="round"/>
  <!-- Jack cable -->
  <line x1="70" y1="20" x2="70" y2="80" stroke="#4A90D9" stroke-width="4" stroke-linecap="round"/>
  <!-- Jack connector -->
  <rect x="64" y="80" width="12" height="6" rx="3" fill="#4A90D9"/>
  <rect x="66" y="86" width="8" height="4" rx="2" fill="#4A90D9"/>
  <rect x="67" y="90" width="6" height="5" rx="2" fill="#4A90D9"/>
</svg>
